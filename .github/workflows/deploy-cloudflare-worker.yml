name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main
    paths:
      - "infra/**"
      - ".github/workflows/deploy-cloudflare-worker.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy keepalive worker
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate required GitHub variables and secrets
        shell: bash
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          BACKEND_URL: ${{ vars.BACKEND_URL }}
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID" || { echo "Missing secret: CLOUDFLARE_ACCOUNT_ID"; exit 1; }
          test -n "$CLOUDFLARE_API_TOKEN" || { echo "Missing secret: CLOUDFLARE_API_TOKEN"; exit 1; }
          test -n "$BACKEND_URL" || { echo "Missing variable: BACKEND_URL"; exit 1; }

      - name: Inject worker runtime variables
        shell: bash
        env:
          BACKEND_URL: ${{ vars.BACKEND_URL }}
        run: |
          cat >> infra/wrangler.toml <<EOF

          [vars]
          BACKEND_URL = "$BACKEND_URL"
          EOF

      - name: Deploy worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: infra
